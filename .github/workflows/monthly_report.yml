name: Monthly KofiaBond Report

on:
  # 매월 2일 오전 9시(KST = UTC 00:00)에 자동 실행
  schedule:
    - cron: '0 0 2 * *'
  
  # 수동으로도 실행 가능 (테스트용)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '이메일 미발송 테스트 (true/false)'
        required: false
        default: 'false'

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      # 2. Python 환경 설정
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 패키지 설치
      - name: 패키지 설치
        run: pip install -r requirements.txt
      
      # 4. Playwright 브라우저 설치 (Chromium)
      - name: Playwright Chromium 설치
        run: playwright install --with-deps chromium
      
      # 5. 리포트 실행 및 이메일 발송
      - name: 국고채 10년물 리포트 실행
        env:
          # GitHub Secrets에서 이메일 계정 정보를 주입
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi
